name: Deploy Node Backend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend via RSYNC
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: ./
          remote_path: /home/shivalikventures/shivalikbackend
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_KEY }}
          remote_port: 22

      - name: Fix & Restart Backend (FORCE CORRECT PATH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: |
            echo "===== START FIX ====="

            # Go to correct project
            cd /home/shivalikventures/shivalikbackend || exit

            echo "📦 Installing dependencies..."
            npm install --production

            echo "🛑 Remove WRONG PM2 app..."
            npx pm2 delete backend || true

            echo "💀 Kill ALL node processes (important)"
            pkill node || true

            echo "🚀 Start CORRECT backend"
            npx pm2 start /home/shivalikventures/shivalikbackend/server.js --name backend

            echo "💾 Save PM2"
            npx pm2 save --force

            echo "📊 PM2 STATUS"
            npx pm2 list

            echo "📜 LOGS"
            npx pm2 logs backend --lines 20
