name: Deploy Node Backend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend via RSYNC
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=".env"
          path: ./
          remote_path: /home/shivalikventures/shivalikbackend
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_KEY }}

      - name: Force Kill & Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            echo "===== FORCE CLEAN START ====="

            echo "💀 Kill ALL node processes (free port 8000)"
            pkill -9 node || true

            echo "📂 Go to project"
            cd /home/shivalikventures/shivalikbackend

            echo "📦 Install dependencies"
            npm install --production

            echo "🧹 Reset PM2"
            npx pm2 kill || true

            echo "🚀 Start backend on port 8000"
            npx pm2 start server.js --name backend

            echo "💾 Save PM2"
            npx pm2 save --force

            echo "===== DONE ====="
