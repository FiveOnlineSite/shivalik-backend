name: Deploy Node Backend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend via RSYNC
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: ./
          remote_path: /home/shivalikventures/shivalikbackend
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_KEY }}

      - name: Install & Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /home/shivalikventures/shivalikbackend

            echo "📦 Installing dependencies..."
            npm install --production

            echo "🔍 Checking if NEW code exists..."
            grep -r "testing" . || echo "❌ NEW CODE NOT FOUND"

            echo "🛑 Restarting backend..."
            npx pm2 delete backend || true
            npx pm2 start server.js --name backend

            echo "📊 PM2 Status:"
            npx pm2 list

            echo "📜 Logs:"
            npx pm2 logs backend --lines 20
