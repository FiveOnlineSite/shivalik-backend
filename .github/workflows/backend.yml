name: Deploy Node Backend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🚀 Deploy files
      - name: Deploy Backend via RSYNC
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: ./
          remote_path: /home/shivalikventures/shivalikbackend
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_KEY }}
          remote_port: 22

      # 🔥 FULL DEBUG + FORCE FIX
      - name: Debug + Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          script: |
            echo "===== CONNECTED TO SERVER ====="

            cd /home/shivalikventures/shivalikbackend || exit

            echo "===== CURRENT FILE CHECK ====="
            grep -r "testing" . || echo "❌ NEW CODE NOT FOUND"

            echo "===== DEPLOY TIMESTAMP ====="
            date > deploy-check.txt
            cat deploy-check.txt

            echo "===== RUNNING NODE PROCESSES ====="
            ps aux | grep node

            echo "===== PM2 LIST ====="
            npx pm2 list || true

            echo "===== KILL ALL OLD NODE PROCESSES ====="
            pkill node || true

            echo "===== INSTALL DEPENDENCIES ====="
            npm install --production

            echo "===== START CLEAN BACKEND ====="
            npx pm2 delete backend || true
            npx pm2 start /home/shivalikventures/shivalikbackend/server.js --name backend

            echo "===== SAVE PM2 ====="
            npx pm2 save --force

            echo "===== FINAL PM2 STATUS ====="
            npx pm2 list

            echo "===== FINAL LOGS ====="
            npx pm2 logs backend --lines 20
