name: Deploy Node Backend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout latest code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Deploy code (safe, keeps .env)
      - name: Deploy Backend via RSYNC
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=".env"
          path: ./
          remote_path: /home/shivalikventures/shivalikbackend
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_KEY }}

      # 3. Force clean restart (IMPORTANT)
      - name: Install & Force Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            echo "===== DEPLOY START ====="

            cd /home/shivalikventures/shivalikbackend || exit

            echo "📦 Installing dependencies..."
            npm install --production

            echo "💀 Killing all old Node processes..."
            pkill node || true

            echo "🧹 Clearing PM2..."
            npx pm2 delete all || true

            echo "🚀 Starting backend (correct file)..."
            npx pm2 start server.js --name backend

            echo "💾 Saving PM2 config..."
            npx pm2 save --force

            echo "📊 PM2 Status:"
            npx pm2 list

            echo "===== DEPLOY COMPLETE ====="
